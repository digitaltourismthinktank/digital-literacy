<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Module 4.2 · Spreadsheets and CSVs · Digital Literacy for Effective AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   Module 4.2 — paginated lesson.
   One part per frame, advanced with back/next. The lesson opens
   on a designed cover (the orientation video as the centrepiece,
   not an edge thumbnail), then steps through: do it, make sense
   of it, check, choose, your turn, carry forward. Same DTTT shell
   and tokens as the member platform.
   ============================================================ */
:root{
  --navy:#0F2044;--navy-deep:#0A1733;--navy-mid:#1A3060;--navy-light:#E8EDF5;--navy-rule:#CBD5E8;
  --teal:#00857C;--teal-dark:#006B63;--teal-light:#E6F3F2;--teal-text:#006B63;
  --white:#FFFFFF;--bg:#F7F8FA;--surface:#FFFFFF;--border:#E2E6EF;
  --text:#0F2044;--sub:#4A5568;--muted:#8A94A6;
  --green:#1A7A4A;--green-l:#E6F4ED;
  --warn:#925A00;--warn-dark:#6E4400;--warn-l:#FEF3E2;--warn-line:#E8C98A;
  --font:'Inter',-apple-system,sans-serif;
  --font-alt:'IBM Plex Sans',sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:.875rem;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
.app{display:flex;min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit}

/* ───────── SIDEBAR (canonical Context 3 — identical to the member platform) ───────── */
.sidebar{width:256px;min-width:256px;background:var(--navy-deep);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden;box-shadow:inset -1px 0 0 rgba(255,255,255,.07),6px 0 28px rgba(10,23,51,.22);z-index:2}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{height:28px;width:auto;margin-bottom:15px;opacity:.96}
.sb-org{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:4px;background:rgba(255,255,255,.05);cursor:pointer;transition:background .14s}
.sb-org:hover{background:rgba(255,255,255,.09)}
.sb-org-mark{width:30px;height:30px;border-radius:4px;background:linear-gradient(135deg,#27457E,#16284E);display:flex;align-items:center;justify-content:center;font-family:var(--font-alt);font-weight:700;font-size:.8125rem;color:#fff;flex-shrink:0}
.sb-org-info{min-width:0;flex:1}
.sb-org-name{font-family:var(--font-alt);font-size:.8125rem;font-weight:600;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-org-tier{display:flex;align-items:center;gap:5px;font-size:.625rem;color:rgba(255,255,255,.5);font-family:var(--font-mono);letter-spacing:.02em;margin-top:2px}
.sb-org-tier .dot{width:5px;height:5px;border-radius:50%;background:#8FA4C8}
.sb-nav{flex:1;overflow-y:auto;padding:10px 12px}
.sb-nav::-webkit-scrollbar{width:0}
.sb-back{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:0 0 6px;font-size:.75rem;font-weight:500;color:rgba(255,255,255,.5);font-family:var(--font-alt);cursor:pointer;border-radius:4px;transition:all .14s;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.sb-back:hover{color:#fff;background:rgba(255,255,255,.06)}
.sb-back svg{width:14px;height:14px;flex-shrink:0;opacity:.85}
.sb-section{font-size:.5625rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.26);padding:14px 10px 6px;font-family:var(--font-alt)}
.ni{display:flex;align-items:center;gap:11px;padding:8px 11px;cursor:pointer;font-size:.8125rem;font-weight:400;color:rgba(255,255,255,.55);transition:all .14s;border-radius:4px;margin-bottom:1px;border:none;background:none;width:100%;text-align:left;text-decoration:none}
.ni:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
.ni.on{color:#fff;background:rgba(255,255,255,.1);font-weight:500}
.ni svg{width:17px;height:17px;flex-shrink:0;opacity:.85}
.chev{margin-left:auto;font-size:.55rem;transition:transform .2s;opacity:.5}
.acc-open .chev{transform:rotate(180deg)}
.track-head .tk-n{font-family:var(--font-mono);font-size:.625rem;font-weight:500;color:rgba(255,255,255,.4);min-width:16px;flex-shrink:0}
.track-head .tk-nm{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-head .tk-badge{font-size:.5rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;font-family:var(--font-alt);color:#7FD8CF;background:rgba(0,133,124,.22);padding:.1rem .35rem;border-radius:2px;margin-left:auto}
.track-head .tk-badge+.chev{margin-left:.4rem}
.sb-prog-sub{padding-left:8px;margin-top:2px}
.ni-sub{display:flex;align-items:center;gap:10px;padding:7px 11px;cursor:pointer;font-size:.75rem;color:rgba(255,255,255,.42);transition:all .14s;border-radius:4px;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
.ni-sub:hover{color:rgba(255,255,255,.78);background:rgba(255,255,255,.05)}
.ni-sub.on{color:#fff;background:rgba(255,255,255,.08)}
.ni-sub .pico{width:18px;height:18px;border-radius:3px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.5625rem;font-family:var(--font-mono);font-weight:500}
.ni-sub.on .pico{background:var(--teal);color:#fff}
.ni-sub .pico.done{background:var(--green);color:#fff}
.ni-sub .msub-t{flex:1;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3}
.sb-foot{padding:10px 12px 14px;border-top:1px solid rgba(255,255,255,.07)}
.sb-user{display:flex;align-items:center;gap:10px;padding:9px 10px 9px;margin-top:6px;border-top:1px solid rgba(255,255,255,.07)}
.sb-ava{width:30px;height:30px;border-radius:50%;background:#27457E;display:flex;align-items:center;justify-content:center;font-size:.6875rem;font-weight:600;color:#fff;font-family:var(--font-alt);flex-shrink:0}
.sb-user-info{min-width:0;flex:1}
.sb-user-name{font-size:.75rem;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:.625rem;color:rgba(255,255,255,.4)}

/* ───────── MAIN + TOPBAR ───────── */
.main-col{flex:1;min-width:0;background:var(--bg);display:flex;flex-direction:column}
.top-bar{background:var(--navy)}
.top-bar-inner{padding:.95rem 2.75rem;max-width:1100px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:2rem}
.bc{font-size:.6875rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.45);display:flex;align-items:center;gap:.5rem;font-family:var(--font-alt)}
.bc .sep{color:rgba(255,255,255,.22)}
.bc .cur{color:rgba(255,255,255,.85)}
.tb-exit{font-family:var(--font-alt);font-size:.72rem;font-weight:600;color:rgba(255,255,255,.6);display:inline-flex;align-items:center;gap:.4rem;cursor:pointer}
.tb-exit:hover{color:#fff}
.tb-exit svg{width:13px;height:13px}

/* ───────── LESSON STAGE ───────── */
.wrap{flex:1;display:flex;align-items:flex-start;justify-content:center;padding:2rem 2rem 2.6rem}
.stage{width:100%;max-width:940px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 18px 50px -28px rgba(15,32,68,.28);display:flex;flex-direction:column;height:min(86vh,710px);overflow:hidden}

/* progress segments */
.stage-prog{display:flex;gap:5px;padding:14px 18px 13px}
.seg{flex:1;height:5px;border-radius:3px;background:var(--navy-rule);transition:background .3s}
.seg.past{background:var(--teal)}
.seg.on{background:var(--teal);box-shadow:0 0 0 3px rgba(0,133,124,.16)}

/* body (one frame, vertically settled) */
.stage-body{flex:1;display:flex;flex-direction:column;overflow:auto;padding:1.35rem 2.4rem .5rem}
.stage-body::-webkit-scrollbar{width:8px}
.stage-body::-webkit-scrollbar-thumb{background:var(--navy-rule);border-radius:4px}
.frame{margin:auto 0;width:100%;animation:fin .26s ease}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fr-eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-alt);font-size:.625rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:var(--teal-text);margin-bottom:.7rem}
.fr-eyebrow .n{font-family:var(--font-mono);color:var(--muted)}
.fr-title{font-family:var(--font-alt);font-size:1.5rem;font-weight:600;color:var(--navy);letter-spacing:-.02em;line-height:1.16;margin-bottom:1rem;text-wrap:balance}
.fr-intro{font-size:.95rem;font-weight:300;color:var(--sub);line-height:1.6;max-width:62ch;margin-bottom:1.2rem}
.fr-intro .em{color:var(--navy);font-weight:500}

/* footer nav */
.stage-foot{display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:1rem 1.6rem;border-top:1px solid var(--border);background:var(--bg)}
.nav-btn{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-alt);font-size:.8125rem;font-weight:600;padding:.6rem 1.1rem;border-radius:4px;cursor:pointer;border:1.5px solid var(--border);background:var(--surface);color:var(--navy);transition:all .14s}
.nav-btn:hover{border-color:var(--navy-rule)}
.nav-btn svg{width:15px;height:15px}
.nav-btn.primary{background:var(--navy);border-color:var(--navy);color:#fff}
.nav-btn.primary:hover{background:var(--navy-mid)}
.nav-btn.complete{background:var(--teal);border-color:var(--teal);color:#fff}
.nav-btn.complete:hover{background:var(--teal-dark)}
.nav-btn[disabled]{opacity:.35;cursor:default;pointer-events:none}
.foot-mid{font-family:var(--font-mono);font-size:.6875rem;font-weight:500;color:var(--muted);letter-spacing:.03em;text-align:center}
.foot-mid b{color:var(--navy);font-family:var(--font-alt)}

/* ───────── COVER FRAME ───────── */
.stage-body.flush{padding:0;display:block;overflow:hidden;height:100%}
.cover{background:var(--navy);height:100%;display:grid;grid-template-columns:1.15fr .85fr;gap:2.4rem;align-items:center;padding:2.6rem 2.8rem;position:relative;overflow:hidden}
.cover::after{content:"";position:absolute;right:-120px;top:-120px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(0,133,124,.16),transparent 68%);pointer-events:none}
.cv-eyebrow{display:inline-flex;align-items:center;gap:.5rem;font-family:var(--font-alt);font-size:.625rem;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:#8FA4C8;margin-bottom:1.1rem}
.cv-h{font-family:var(--font-alt);font-size:2.3rem;font-weight:600;color:#fff;letter-spacing:-.03em;line-height:1.05;margin-bottom:1rem;text-wrap:balance}
.cv-hook{font-size:1.05rem;font-weight:300;color:rgba(255,255,255,.74);line-height:1.55;max-width:34ch;margin-bottom:1.4rem}
.cv-hook .em{color:#fff;font-weight:500}
.cv-outcome{display:flex;gap:.65rem;align-items:flex-start;background:rgba(0,133,124,.16);border:1px solid rgba(0,133,124,.34);border-radius:6px;padding:.85rem 1rem;max-width:44ch;position:relative;z-index:1}
.cv-outcome svg{width:16px;height:16px;color:#7FD8CF;flex-shrink:0;margin-top:.15rem}
.cv-outcome .ot{font-size:.5625rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#7FD8CF;font-family:var(--font-alt);margin-bottom:.2rem}
.cv-outcome .ob{font-size:.85rem;font-weight:400;color:rgba(255,255,255,.9);line-height:1.5}
.cv-meta{display:flex;align-items:center;gap:.6rem;margin-top:1.1rem;font-family:var(--font-mono);font-size:.625rem;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.02em}
.cv-meta .d{opacity:.5}
/* the video, as the cover's deliberate right-hand piece */
.cv-video{position:relative;z-index:1;justify-self:center;width:100%;max-width:300px}
.cv-vlabel{font-family:var(--font-alt);font-size:.5625rem;font-weight:600;letter-spacing:.11em;text-transform:uppercase;color:#8FA4C8;margin-bottom:.7rem;text-align:center}
.cv-vcard{aspect-ratio:1/1;border-radius:10px;overflow:hidden;position:relative;background:#0A1733;border:1px solid rgba(255,255,255,.12);cursor:pointer;display:block;width:100%;padding:0;box-shadow:0 20px 50px -20px rgba(0,0,0,.5)}
.cv-vcard .vsk{position:absolute;inset:0;background:linear-gradient(150deg,#16284E,#0A1733)}
.cv-vspk{position:absolute;top:.85rem;left:.85rem;z-index:2;display:flex;align-items:center;gap:.5rem}
.cv-vava{width:30px;height:30px;border-radius:50%;background:#27457E;display:flex;align-items:center;justify-content:center;font-family:var(--font-alt);font-size:.6875rem;font-weight:600;color:#fff}
.cv-vspk .t{font-family:var(--font-alt);font-size:.6875rem;font-weight:500;color:rgba(255,255,255,.85);text-align:left;line-height:1.2}
.cv-vplay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2}
.cv-vplay i{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.16);border:1.5px solid rgba(255,255,255,.46);display:flex;align-items:center;justify-content:center;transition:all .15s}
.cv-vcard:hover .cv-vplay i{background:rgba(255,255,255,.28);transform:scale(1.05)}
.cv-vplay svg{width:22px;height:22px;margin-left:3px;color:#fff}
.cv-vdur{position:absolute;bottom:.85rem;left:0;right:0;z-index:2;text-align:center;font-family:var(--font-mono);font-size:.625rem;color:rgba(255,255,255,.7)}
.cv-vcap{text-align:center;font-size:.7rem;color:rgba(255,255,255,.5);margin-top:.7rem;font-style:italic}

/* ───────── shared learning components ───────── */
/* split: what you see vs what AI receives */
.cc-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1.4rem 1.6rem;margin-bottom:1.2rem}
.cc-lead .l-t{font-family:var(--font-alt);font-size:1rem;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:.5rem}
.cc-lead .l-b{font-size:.85rem;font-weight:300;color:var(--sub);line-height:1.6}
.term-btn{font:inherit;font-weight:600;color:var(--navy);background:none;border:none;border-bottom:1.5px dashed var(--teal);padding:0;cursor:pointer}
.term-btn:hover{color:var(--teal-text)}
.term-panel{margin:.55rem 0 0;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--navy);border-radius:4px;padding:.75rem .9rem;font-size:.8rem;font-weight:300;color:var(--sub);line-height:1.55}
.term-panel .tl{font-size:.5625rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--navy);font-family:var(--font-alt);margin-bottom:.3rem}
.cc-split{display:grid;grid-template-columns:1fr auto 1fr;gap:.6rem;align-items:center}
.cc-pane{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)}
.cc-pl{font-family:var(--font-alt);font-size:.5rem;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:.4rem .55rem;border-bottom:1px solid var(--border);background:var(--bg)}
.cc-pane.ai .cc-pl{color:var(--teal-text)}
.cc-grid{display:grid;grid-template-columns:repeat(3,1fr);font-family:var(--font-mono);font-size:.56rem}
.cc-grid span{padding:.32rem .35rem;border-right:1px solid var(--border);border-bottom:1px solid var(--border);color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cc-grid span:nth-child(3n){border-right:none}
.cc-grid span.h{background:var(--navy-light);color:var(--navy);font-weight:500}
.cc-grid span:nth-last-child(-n+3){border-bottom:none}
.cc-text{font-family:var(--font-mono);font-size:.56rem;line-height:1.75;color:var(--sub);padding:.5rem .55rem;white-space:pre-wrap;word-break:break-word}
.cc-arrow{color:var(--muted);font-size:1rem;display:flex;align-items:center;justify-content:center}
.sense-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.sense-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:1.1rem 1.2rem;display:flex;gap:.75rem}
.sense-card svg{width:18px;height:18px;flex-shrink:0;margin-top:.1rem}
.sense-card.warnc svg{color:var(--warn)}
.sense-card.eyec svg{color:var(--teal)}
.sense-card .sc-t{font-family:var(--font-alt);font-size:.9rem;font-weight:600;color:var(--navy);line-height:1.3;margin-bottom:.3rem}
.sense-card .sc-b{font-size:.82rem;font-weight:300;color:var(--sub);line-height:1.55}
.sense-card .sc-b b{font-weight:500;color:var(--navy)}

/* inspector */
.insp{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 8px 26px -16px rgba(15,32,68,.22)}
.insp-top{display:flex;align-items:center;gap:1rem;padding:.65rem .9rem;border-bottom:1px solid var(--border);background:var(--bg)}
.insp-file{display:flex;align-items:center;gap:.5rem;font-family:var(--font-mono);font-size:.6875rem;font-weight:500;color:var(--muted)}
.insp-file .dots{display:flex;gap:.3rem}
.insp-file .dots i{width:8px;height:8px;border-radius:50%;background:var(--navy-rule)}
.views{display:flex;gap:.25rem;margin-left:auto;background:var(--surface);border:1px solid var(--border);padding:.22rem;border-radius:4px}
.view-tab{font-family:var(--font-alt);font-size:.72rem;font-weight:600;color:var(--muted);padding:.4rem .75rem;border-radius:3px;cursor:pointer;border:none;background:none;white-space:nowrap}
.view-tab:hover{color:var(--navy)}
.view-tab.on{color:#fff;background:var(--navy)}
.insp-body{min-height:208px;padding:1.1rem 1.2rem;background:var(--surface)}
.raw{font-family:var(--font-mono);font-size:.72rem;line-height:1.95;color:var(--sub);white-space:pre-wrap;word-break:break-word}
.raw .ln{display:block;padding:.05rem .4rem;border-radius:2px}
.raw .ln .gut{display:inline-block;width:1.6em;color:var(--muted);opacity:.6;user-select:none}
.raw .ln.head{color:var(--navy);font-weight:500}
.raw .ln.bad{background:var(--warn-l);box-shadow:inset 2px 0 0 var(--warn)}
.raw .ln.bad .gut{color:var(--warn)}
.raw .flagchip{margin-left:.6rem;font-family:var(--font-alt);font-size:.6rem;font-weight:600;color:var(--warn);background:#fff;border:1px solid var(--warn-line);padding:.05rem .4rem;border-radius:2px}
.grid-wrap{overflow-x:auto}
table.grid{border-collapse:collapse;font-family:var(--font-mono);font-size:.72rem;width:100%}
table.grid th,table.grid td{border:1px solid var(--border);padding:.42rem .65rem;text-align:left;white-space:nowrap}
table.grid thead th{background:var(--bg);color:var(--navy);font-weight:500}
table.grid .rownum{background:var(--bg);color:var(--muted);width:30px;text-align:center}
table.grid th.ph{color:var(--warn);background:var(--warn-l)}
table.grid td.bad{background:var(--warn-l);color:var(--warn-dark);box-shadow:inset 0 0 0 1.5px var(--warn)}
table.grid td.empty{background:repeating-linear-gradient(45deg,#fff,#fff 4px,var(--bg) 4px,var(--bg) 8px)}
.ai-reads{display:flex;flex-direction:column;gap:.9rem}
.ai-line{display:flex;align-items:center;gap:.6rem;font-family:var(--font-alt);font-size:.82rem;font-weight:600;color:var(--navy)}
.ai-line .ai-glyph{width:26px;height:26px;border-radius:6px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-line .ai-glyph svg{width:14px;height:14px}
.ai-cols{display:flex;flex-wrap:wrap;gap:.45rem}
.ai-col{display:flex;flex-direction:column;gap:.15rem;background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:.5rem .7rem;min-width:104px}
.ai-col .acn{font-family:var(--font-mono);font-size:.7rem;font-weight:500;color:var(--navy)}
.ai-col .act{font-family:var(--font-alt);font-size:.58rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--teal-text)}
.ai-col.bad{background:var(--warn-l);border-color:var(--warn-line)}
.ai-col.bad .act{color:var(--warn)}
.ai-stat{display:flex;align-items:center;gap:.5rem;font-family:var(--font-mono);font-size:.68rem;font-weight:500;color:var(--sub)}
.ai-stat svg{width:13px;height:13px}

var INS={scn:'clean',view:'raw'};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function cellVal(c){return (c&&typeof c==='object')?c:{v:c};}
function renderInsp(){
  var d=SCN[INS.scn];var body=document.getElementById('inspBody');if(!body)return;
  document.getElementById('inspFile').textContent=d.file;var html='';
  if(INS.view==='raw'){
    html='<div class="raw">'+d.raw.map(function(line,i){var cls='ln'+(line.head?' head':'')+(line.bad?' bad':'');var flag=line.flag?'<span class="flagchip">'+esc(line.flag)+'</span>':'';return '<span class="'+cls+'"><span class="gut">'+(i+1)+'</span>'+esc(line.t)+flag+'</span>';}).join('')+'</div>';
  } else if(INS.view==='grid'){
    var maxCols=d.maxCols||d.headers.length;html='<div class="grid-wrap"><table class="grid"><thead><tr><th class="rownum">#</th>';
    for(var i=0;i<maxCols;i++){var h=d.headers[i];if(h===undefined){html+='<th class="ph">(extra)</th>';}else{var hc=cellVal(h);html+='<th'+(hc.bad?' class="ph"':'')+'>'+esc(hc.v)+'</th>';}}
    html+='</tr></thead><tbody>';
    d.rows.forEach(function(row,r){html+='<tr><td class="rownum">'+(r+1)+'</td>';for(var i=0;i<maxCols;i++){var c=cellVal(row[i]!==undefined?row[i]:'');var cls=(c.bad?'bad':'')+(c.empty?' empty':'');html+='<td'+(cls.trim()?' class="'+cls.trim()+'"':'')+'>'+esc(c.empty?'\u2014':c.v)+'</td>';}html+='</tr>';});
    html+='</tbody></table></div>';
  } else {
    var a=d.ai;html='<div class="ai-reads"><div class="ai-line"><span class="ai-glyph">'+ic(ICONS.spark,2)+'</span>What the model parses</div><div class="ai-cols">';
    a.cols.forEach(function(c){html+='<div class="ai-col'+(c[2]?' bad':'')+'"><span class="acn">'+esc(c[0])+'</span><span class="act">'+esc(c[1])+'</span></div>';});
    html+='</div><div class="ai-stat">'+ic(ICONS.bars,2)+' Detected '+a.cols.length+' columns · '+a.rowCount+' data rows</div>';
    if(a.ok)html+='<div class="ai-ok">'+ic(ICONS.check,2.4)+a.ok+'</div>';
    a.warnings.forEach(function(w){html+='<div class="ai-warn">'+ic(ICONS.warn,2)+'<span><b>'+w[0]+'</b> '+w[1]+'</span></div>';});
    html+='</div>';
  }
  body.innerHTML=html;
}
function bindInsp(){
  var views=document.getElementById('views');if(!views)return;

}

var cur=0;var LAST=FRAMES.length-1;

function renderFrame(){

  if(cur===0){mid.innerHTML='Introduction';next.className='nav-btn primary';next.innerHTML='Begin '+ic(ICONS.arrow,2.2);}
  else if(cur===LAST){mid.innerHTML='<b>Step 6</b> of 6';next.className='nav-btn complete';next.innerHTML='Mark complete '+ic(ICONS.check,2.4);}
  else {mid.innerHTML='<b>Step '+cur+'</b> of 6';next.className='nav-btn primary';next.innerHTML='Next '+ic(ICONS.arrow,2.2);}
  renderProg();

  body.querySelectorAll('.term-btn').forEach(function(b){b.addEventListener('click',function(){var p=document.getElementById('term-'+b.dataset.term);if(p)p.hidden=!p.hidden;});});
  body.querySelectorAll('[data-reveal]').forEach(function(r){var btn=r.querySelector('.reveal-btn');btn.addEventListener('click',function(){r.querySelector('.reveal-ans').hidden=false;btn.style.display='none';});});
  if(f.kind==='exercise'){
    var dl=document.getElementById('dlSample');
    if(dl){var csv="date,property,guests,revenue\n2026-07-01,Harbour View,3,420.00\n2026-07-02,Naoussa, Paros,5,710.50\n2026-07-03,Seaside Cabin,280.00\n04/07/2026,Old Town Loft,5,710.50\n";dl.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));}

  }
}
function go(n){cur=Math.max(0,Math.min(LAST,n));renderFrame();}
document.getElementById('back').addEventListener('click',function(){go(cur-1);});
document.getElementById('next').addEventListener('click',function(){if(cur===LAST){go(0);return;}go(cur+1);});
document.addEventListener('keydown',function(e){if(e.target.closest('input,textarea'))return;if(e.key==='ArrowRight')go(cur+1);if(e.key==='ArrowLeft')go(cur-1);});

var lb=document.getElementById('vidLightbox');
function openLb(){lb.classList.add('open');}
function closeLb(){lb.classList.remove('open');}
document.querySelectorAll('[data-vidclose]').forEach(function(b){b.addEventListener('click',closeLb);});

renderFrame();
